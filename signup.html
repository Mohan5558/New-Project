<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<div class="container">
    <h1>Create your <br> PopX account</h1>

    <div class="input-group">
        <label>Full Name*</label>
        <input type="text" placeholder="Marry Doe">
    </div>

    <div class="input-group">
        <label>Phone number*</label>
        <input type="text" placeholder="Marry Doe">
    </div>

    <div class="input-group">
        <label>Email address*</label>
        <input type="email" placeholder="Marry Doe">
    </div>

    <div class="input-group">
        <label>Password*</label>
        <input type="password" placeholder="Marry Doe">
    </div>

    <div class="input-group">
        <label>Company name</label>
        <input type="text" placeholder="Marry Doe">
    </div>

    <p>Are you an Agency?</p>
    <input type="radio" checked> Yes
    <input type="radio"> No

    <button class="btn primary" onclick="goToProfile()">Create Account</button>
</div>

</body>
</html>
